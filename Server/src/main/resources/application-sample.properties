# App
spring.application.name=Cricriser
server.port=${PORT:8080}
spring.main.allow-bean-definition-overriding=true

# MongoDB
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:}
spring.data.mongodb.database=${SPRING_DATA_MONGODB_DATABASE:}

# Email / OTP
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
email.enabled=${EMAIL_ENABLED:false}
app.otp.valid-minutes=${APP_OTP_VALID_MINUTES:10}

# JWT
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-32-char-secret}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}

# Frontend origins (comma-separated)
app.allowed.origins=${APP_ALLOWED_ORIGINS:http://localhost:5173,https://cricriser.vercel.app,https://*.vercel.app}

# Cloudinary (or use CLOUDINARY_URL)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# File uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

